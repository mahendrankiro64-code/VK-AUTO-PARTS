{% extends "base.html" %}
{% block title %}Users{% endblock %}
{% block content %}
<h4 class="mb-3">Staff Users</h4>
<div class="row g-3">
  <div class="col-md-5">
    <div class="card p-3">
      <h6>Add User</h6>
      <form method="post">
        <input type="hidden" name="action" value="create">
        <div class="mb-2"><input type="text" name="username" class="form-control" placeholder="Username" required></div>
        <div class="mb-2"><input type="text" name="full_name" class="form-control" placeholder="Full name" required></div>
        <div class="mb-2">
          <select name="role" class="form-select">
            <option value="cashier">Cashier</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="mb-2"><input type="password" name="password" class="form-control" placeholder="Password" required></div>
        <button class="btn btn-primary w-100">Create User</button>
      </form>
    </div>
  </div>
  <div class="col-md-7">
    <div class="card p-3">
      <table class="table table-sm">
        <thead><tr><th>Username</th><th>Full Name</th><th>Role</th><th>Status</th><th></th></tr></thead>
        <tbody>
        {% for u in users %}
          <tr>
            <td>{{ u.username }}</td><td>{{ u.full_name }}</td><td>{{ u.role }}</td>
            <td><span class="badge bg-{{ 'success' if u.active else 'secondary' }}">{{ 'active' if u.active else 'disabled' }}</span></td>
            <td>
              <form method="post" class="d-inline">
                <input type="hidden" name="action" value="toggle">
                <input type="hidden" name="user_id" value="{{ u.id }}">
                <button class="btn btn-sm btn-outline-secondary">{{ 'Disable' if u.active else 'Enable' }}</button>
              </form>
            </td>
          </tr>
        {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
