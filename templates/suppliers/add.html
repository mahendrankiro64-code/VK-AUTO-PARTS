{% extends "base.html" %}
{% block title %}Add Supplier{% endblock %}
{% block content %}
<h4 class="mb-3">Add New Supplier</h4>
<div class="card p-4" style="max-width:600px;">
  <form method="post">
    <div class="mb-3"><label class="form-label">Name *</label><input type="text" name="name" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control"></div>
    <div class="mb-3"><label class="form-label">Address</label><textarea name="address" class="form-control"></textarea></div>
    <button class="btn btn-primary">Save Supplier</button>
    <a href="{{ url_for('suppliers.list_suppliers') }}" class="btn btn-outline-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
